<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-top: 50px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-predict { background-color: #0d6efd; color: white; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h2 class="text-center mb-4">🏦 Credit Risk Assessment</h2>
                <hr>
                
                <form action="/predict" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" name="person_age" class="form-control" placeholder="e.g. 25" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Annual Income</label>
                            <input type="number" name="person_income" class="form-control" placeholder="e.g. 50000" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Home Ownership</label>
                            <select name="person_home_ownership" class="form-select">
                                <option value="0">Rent</option>
                                <option value="1">Mortgage</option>
                                <option value="2">Own</option>
                                <option value="3">Other</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Employment Length (Years)</label>
                            <input type="number" name="person_emp_length" class="form-control" placeholder="e.g. 5" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Loan Intent</label>
                            <select name="loan_intent" class="form-select">
                                <option value="0">Education</option>
                                <option value="1">Medical</option>
                                <option value="2">Venture</option>
                                <option value="3">Personal</option>
                                <option value="4">Debt Consolidation</option>
                                <option value="5">Home Improvement</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Loan Grade</label>
                            <select name="loan_grade" class="form-select">
                                <option value="0">A</option>
                                <option value="1">B</option>
                                <option value="2">C</option>
                                <option value="3">D</option>
                                <option value="4">E</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Loan Amount</label>
                            <input type="number" name="loan_amnt" class="form-control" placeholder="e.g. 10000" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Interest Rate (%)</label>
                            <input type="number" step="0.01" name="loan_int_rate" class="form-control" placeholder="e.g. 11.5" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Loan % of Income</label>
                            <input type="number" step="0.01" name="loan_percent_income" class="form-control" placeholder="e.g. 0.2" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Default History</label>
                            <select name="cb_person_default_on_file" class="form-select">
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label">Credit History Length (Years)</label>
                            <input type="number" name="cb_person_cred_hist_length" class="form-control" placeholder="e.g. 3" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-predict btn-lg mt-3">Check Credit Risk</button>
                </form>

                {% if prediction_text %}
                <div class="alert alert-info mt-4 text-center">
                    <h4>Result: {{ prediction_text }}</h4>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

</body>
</html>
